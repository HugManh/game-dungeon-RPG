<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Explorer RPG</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/css/game.css">
</head>
<body class="flex flex-col h-screen w-screen p-2 md:p-4 md:items-center justify-center">

    <div id="game-container" class="w-full max-w-[1200px] flex flex-col md:flex-row gap-4 h-full md:h-auto">
        
        <!-- Left Column: Game Area -->
        <div class="flex-grow flex flex-col items-center justify-center relative">
            
            <div id="top-bar" class="w-full flex justify-between items-center mb-2 px-2 pixel-font text-xs md:text-base" style="color: #6f97a9;">
                <div>Level: <span id="ui-level" style="color: #8cbbca;">1</span></div>
                <div>Floor: <span id="ui-floor" class="text-purple-300">1</span></div>
                <div>Score: <span id="ui-score" class="text-yellow-300">0</span></div>
            </div>

            <div id="board-container" class="w-full aspect-square max-h-[65vh] md:max-h-[85vh] flex items-center justify-center">
                <div id="game-board" class="w-full h-full"></div>
            </div>

            <!-- Mobile Controls Overlay (only visible on small screens typically) -->
            <div id="mobile-controls" class="mt-4 flex flex-col items-center gap-2 md:hidden">
                <div class="d-pad-btn" id="btn-up">⬆️</div>
                <div class="flex gap-2">
                    <div class="d-pad-btn" id="btn-left">⬅️</div>
                    <div class="d-pad-btn" id="btn-down">⬇️</div>
                    <div class="d-pad-btn" id="btn-right">➡️</div>
                </div>
            </div>
        </div>

        <!-- Right Column: UI & Stats -->
        <div class="w-full md:w-80 flex flex-col gap-4 ui-panel p-4 rounded-xl border-2 shadow-xl overflow-hidden shrink-0">
            
            <div class="text-center pb-2 border-b" style="border-color: #415d65;">
                <h1 class="pixel-font text-lg" style="color: #8cbbca;">Dungeon<br>Explorer</h1>
            </div>

            <!-- Stats -->
            <div class="flex flex-col gap-2">
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>Health</span>
                    </div>
                    <div class="bar-container">
                        <div id="hp-bar" class="bar-fill hp-fill" style="width: 100%;"></div>
                        <div id="hp-text" class="bar-text">20 / 20</div>
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between text-xs mb-1">
                        <span>Experience</span>
                    </div>
                    <div class="bar-container">
                        <div id="xp-bar" class="bar-fill xp-fill" style="width: 0%;"></div>
                        <div id="xp-text" class="bar-text">0 / 10</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 text-sm mt-2 p-2 ui-inner-panel rounded border">
                    <div>Atk: <span id="ui-atk" class="font-bold text-red-400">5</span></div>
                    <div>Def: <span id="ui-def" class="font-bold" style="color: #80acba;">2</span></div>
                </div>
            </div>

            <!-- Message Log -->
            <div class="flex-grow flex flex-col min-h-[100px]">
                <h3 class="text-xs font-bold uppercase tracking-wider mb-2 border-b pb-1" style="color: #5c7e88; border-color: #415d65;">Adventure Log</h3>
                <div id="log-container" class="ui-inner-panel p-2 rounded border text-xs font-mono h-full flex-grow">
                    <!-- Logs go here -->
                </div>
            </div>
            
            <div class="text-xs text-center pt-2" style="color: #5c7e88;">
                Use Arrow Keys / WASD to move.<br>Bump into enemies to attack.
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4">
        <div class="ui-panel border-4 border-red-900 p-8 rounded-xl max-w-sm w-full text-center flex flex-col items-center shadow-[0_0_50px_rgba(220,38,38,0.5)]">
            <h2 class="pixel-font text-3xl text-red-500 mb-4">YOU DIED</h2>
            <div class="mb-6 space-y-2 text-lg" style="color: #8cbbca;">
                <p>Floor Reached: <span id="end-floor" class="font-bold text-purple-400">1</span></p>
                <p>Final Level: <span id="end-level" class="font-bold" style="color: #80acba;">1</span></p>
                <p>Score: <span id="end-score" class="font-bold text-yellow-400">0</span></p>
            </div>
            <button id="restart-btn" class="pixel-font bg-red-800 hover:bg-red-700 text-white py-3 px-6 rounded border-2 border-red-500 transition-colors w-full">TRY AGAIN</button>
        </div>
    </div>

    <div id="msg-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-40 flex items-center justify-center p-4">
        <div class="ui-panel border-2 p-6 rounded-xl max-w-sm w-full text-center flex flex-col items-center" style="border-color: #5c7e88;">
            <h2 id="msg-title" class="pixel-font text-xl mb-4" style="color: #80acba;">Info</h2>
            <p id="msg-content" class="mb-6" style="color: #8cbbca;">Message goes here.</p>
            <button id="msg-close-btn" class="ui-inner-panel hover:bg-opacity-80 text-white py-2 px-6 rounded border transition-colors w-full" style="border-color: #5c7e88; color: #8cbbca;">OK</button>
        </div>
    </div>
    <script type="module" src="assets/js/game.js"></script>
</body>
</html>
